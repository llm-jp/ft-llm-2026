name: Python Tests

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main

jobs:
  math-eval-tests:
    name: math-eval pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    defaults:
      run:
        working-directory: math-eval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: uv run pytest -q
